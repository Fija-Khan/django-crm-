{% extends 'base.html' %}

{% block title %}Add Contact{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="crm-contact-page">

        <div class="crm-card">

            <!-- Header -->
            <div class="mb-4">

                <h2 class="crm-title">
                    <i class="bi bi-person-plus-fill me-2"></i>
                    Add New Contact
                </h2>

                <p class="crm-page-subtitle">
                    Enter the contact details below to create a new contact.
                </p>

            </div>

            <!-- Form -->
            <form method="POST">

                {% csrf_token %}

                <div class="crm-form-wrapper">
                    {{ form.as_p }}
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 mt-4">

                    <button type="submit" class="crm-btn-primary">
                        <i class="bi bi-check-circle me-2"></i>
                        Save Contact
                    </button>

                    <!-- Fixed -->
                    <a href="{% url 'contacts:contact_list' %}" class="crm-btn-secondary">
                        <i class="bi bi-arrow-left me-2"></i>
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
