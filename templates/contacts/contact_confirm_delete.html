{% extends 'base.html' %}

{% block title %}Delete Contact{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="crm-delete-page">

        <div class="crm-card text-center">

            <div class="card-body">

                <div class="crm-delete-icon">
                    <i class="bi bi-trash-fill"></i>
                </div>

                <h2 class="crm-title mt-3">
                    Delete Contact
                </h2>

                <p class="crm-page-subtitle">
                    This action cannot be undone.
                </p>

                <div class="crm-detail-box mt-4">

                    <strong>
                        {{ object.first_name }} {{ object.last_name }}
                    </strong>

                </div>

                <p class="mt-4 text-light">
                    Are you sure you want to permanently delete this contact?
                </p>

                <form method="POST" class="d-flex justify-content-center gap-2 mt-4">

                    {% csrf_token %}

                    <button type="submit" class="crm-btn-danger">
                        <i class="bi bi-trash"></i>
                        Delete
                    </button>

                    <a href="{% url 'contact_detail' object.id %}" class="crm-btn-secondary">
                        <i class="bi bi-arrow-left"></i>
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
