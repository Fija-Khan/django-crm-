{% extends 'base.html' %}

{% block title %}Delete Contact{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card border-danger">

        <div class="card-body text-center">

            <h3 class="text-danger">⚠️ Delete Contact</h3>

            <p class="mt-3">
                Are you sure you want to delete
                <strong>{{ object.first_name }} {{ object.last_name }}</strong>?
            </p>

            <form method="POST">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>

                <a href="{% url 'contact_detail' object.id %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>

        </div>

    </div>

</div>

{% endblock %}
