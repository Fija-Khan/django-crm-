{% extends "base.html" %}

{% block title %}
Delete Note
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">

            <h4 class="mb-0">

                Delete Note

            </h4>

        </div>

        <div class="card-body">

            <p class="fs-5">

                Are you sure you want to delete this note?

            </p>

            <div class="alert alert-warning">

                <strong>Note:</strong>

                {{ object.content|truncatechars:100 }}

            </div>

            <form method="post">

                {% csrf_token %}

                <button type="submit" class="btn btn-danger">

                    Yes, Delete

                </button>

                <a href="{% url 'note_list' %}" class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
