{% extends "base.html" %}

{% block title %}
Delete Note
{% endblock %}


{% block content %}

<div class="container-fluid mt-4">


    <div class="crm-card p-4 text-center">


        <div class="mb-3">

            <i class="bi bi-trash3 text-danger"
               style="font-size:50px;">
            </i>

        </div>



        <h3 class="text-white mb-3">
            Delete Note
        </h3>



        <p class="text-muted fs-5">

            Are you sure you want to delete this note?

        </p>




        <div class="delete-box mb-4">


            <p class="text-white mb-0">

                <strong>Note:</strong>

                {{ object.content|truncatechars:100 }}

            </p>


        </div>





        <form method="post">

            {% csrf_token %}


            <button type="submit"
                    class="btn btn-danger px-4">

                <i class="bi bi-trash me-1"></i>

                Yes, Delete

            </button>



            <a href="{% url 'note_list' %}"
               class="btn btn-outline-light ms-2 px-4">

                Cancel

            </a>


        </form>



    </div>


</div>


{% endblock %}
