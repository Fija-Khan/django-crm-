{% extends "base.html" %}

{% block title %}
Delete Deal
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <h3 class="text-danger">Delete Deal</h3>

            <p class="mt-3">

                Are you sure you want to delete

                <strong>{{ deal.lead }}</strong> ?

            </p>

            <p>
                <strong>Amount:</strong> ₹ {{ deal.amount }}
            </p>

            <form method="POST">

                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>

                <a href="{% url 'deal_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
