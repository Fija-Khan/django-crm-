{% extends "base.html" %}

{% block title %}
Deal Form
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                {% if form.instance.pk %}
                    Edit Deal
                {% else %}
                    Add Deal
                {% endif %}

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'deal_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
