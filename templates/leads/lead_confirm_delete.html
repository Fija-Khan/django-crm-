{% extends "base.html" %}

{% block title %}
Delete Lead
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card crm-card">

                <div class="card-body text-center p-5">

                    <div class="mb-4">
                        <i class="bi bi-trash-fill display-3 text-danger"></i>
                    </div>

                    <h2 class="crm-title mb-3">
                        Delete Lead
                    </h2>

                    <p class="crm-small mb-4">
                        Are you sure you want to permanently delete this lead?
                    </p>

                    <div class="crm-detail-box text-start mb-3">
                        <strong class="text-crm-primary">Title :</strong>
                        <span class="ms-2">{{ lead.title }}</span>
                    </div>

                    <div class="crm-detail-box text-start mb-3">
                        <strong class="text-crm-primary">Contact :</strong>
                        <span class="ms-2">{{ lead.contact }}</span>
                    </div>

                    <div class="crm-detail-box text-start mb-4">
                        <strong class="text-crm-primary">Status :</strong>
                        <span class="ms-2">{{ lead.get_status_display }}</span>
                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-3">

                            <button type="submit"
                                    class="crm-btn-danger">

                                <i class="bi bi-trash me-1"></i>
                                Delete Lead

                            </button>

                            <a href="{% url 'lead_detail' lead.id %}"
                               class="crm-btn-secondary">

                                <i class="bi bi-arrow-left me-1"></i>
                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
