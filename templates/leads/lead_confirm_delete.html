{% extends "base.html" %}

{% block title %}
Delete Lead
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">
            <h3>Delete Lead</h3>
        </div>

        <div class="card-body">

            <h5>Are you sure you want to delete this lead?</h5>

            <hr>

            <p><strong>Title:</strong> {{ lead.title }}</p>

            <p><strong>Contact:</strong> {{ lead.contact }}</p>

            <p><strong>Status:</strong> {{ lead.get_status_display }}</p>

            <form method="POST">

                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Delete
                </button>

                <a href="{% url 'lead_detail' lead.id %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
