{% extends "base.html" %}

{% block title %}Add Lead{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">

                <div>

                    <h2 class="crm-title mb-1">
                        <i class="bi bi-person-plus-fill me-2"></i>
                        Add New Lead
                    </h2>

                    <p class="text-muted mb-0">
                        Create a new lead and assign it to your sales pipeline.
                    </p>

                </div>

                <a href="{% url 'leads:lead_list' %}" class="crm-btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>
                    Back to Leads
                </a>

            </div>

            <!-- Form Card -->
            <div class="card crm-card shadow-sm border-0">

                <div class="card-body p-4">

                    <form method="POST" novalidate>

                        {% csrf_token %}

                        {{ form.as_p }}

                        <hr class="my-4">

                        <div class="d-flex gap-2">

                            <button type="submit" class="crm-btn-primary">
                                <i class="bi bi-check-circle me-1"></i>
                                Save Lead
                            </button>

                            <a href="{% url 'leads:lead_list' %}" class="crm-btn-secondary">
                                <i class="bi bi-x-circle me-1"></i>
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
