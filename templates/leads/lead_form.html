{% extends "base.html" %}

{% block title %}
Add Lead
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Add Lead</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Save Lead
        </button>

        <a href="{% url 'lead_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
