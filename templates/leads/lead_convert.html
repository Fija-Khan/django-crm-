{% extends "base.html" %}

{% block title %}
Convert Lead
{% endblock %}

{% block content %}

<div class="container-fluid convert-lead-page">

    <div class="row justify-content-center align-items-center">

        <div class="col-xl-5 col-lg-6 col-md-8">

            <div class="card crm-card convert-card">

                <div class="card-body text-center">

                    <div class="convert-icon">

                        <i class="bi bi-arrow-repeat"></i>

                    </div>

                    <h2 class="crm-title mt-4">
                        Convert Lead
                    </h2>

                    <p class="crm-small convert-description">

                        You are about to convert

                        <span class="convert-title">
                            "{{ lead.title }}"
                        </span>

                        into a Deal.

                    </p>

                    <div class="crm-detail-box convert-contact">

                        <i class="bi bi-person-circle"></i>

                        <span>{{ lead.contact }}</span>

                    </div>

                    <form method="POST" class="mt-4">

                        {% csrf_token %}

                        <div class="convert-actions">

                            <button
                                type="submit"
                                class="crm-btn-success">

                                <i class="bi bi-check-circle-fill me-2"></i>

                                Convert Lead

                            </button>

                            <a
                                href="{% url 'lead_list' %}"
                                class="crm-btn-secondary">

                                <i class="bi bi-arrow-left-circle me-2"></i>

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
