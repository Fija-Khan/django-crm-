{% extends "base.html" %}

{% block title %}
Convert Lead
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card crm-card">

                <div class="card-body text-center p-5">

                    <div class="mb-4">

                        <i class="bi bi-arrow-repeat display-3 text-crm-primary"></i>

                    </div>

                    <h2 class="crm-title mb-3">
                        Convert Lead
                    </h2>

                    <p class="crm-small mb-4">

                        Are you sure you want to convert

                        <strong class="text-white">
                            "{{ lead.title }}"
                        </strong>

                        into a Deal?

                    </p>

                    <div class="crm-detail-box mb-4">

                        <i class="bi bi-person-circle me-2 text-info"></i>

                        {{ lead.contact }}

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-3">

                            <button type="submit"
                                    class="crm-btn-success">

                                <i class="bi bi-check-circle me-1"></i>

                                Convert Lead

                            </button>

                            <a href="{% url 'lead_list' %}"
                               class="crm-btn-secondary">

                                <i class="bi bi-x-circle me-1"></i>

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
