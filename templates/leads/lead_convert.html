{% extends "base.html" %}

{% block title %}Convert Lead{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <h3>Convert Lead to Deal</h3>

            <p class="mt-3">
                Are you sure you want to convert
                <strong>{{ lead.title }}</strong> into a Deal?
            </p>

            <form method="POST">
                {% csrf_token %}

                <button type="submit" class="btn btn-success">
                    Yes, Convert
                </button>

                <a href="{% url 'lead_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>

        </div>

    </div>

</div>

{% endblock %}
