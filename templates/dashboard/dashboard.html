{% extends 'base.html' %}

{% block title %}Dashboard - CRM{% endblock %}

{% block extra_css %}
<style>
    .dashboard-title {
        margin-bottom: 20px;
        color: #333;
    }

    .card-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: white;
        padding: 20px;
        width: 200px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    .card h2 {
        margin: 0;
        color: #5e0f13;
    }

    .card p {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
    }
</style>
{% endblock %}

{% block content %}

<h1 class="dashboard-title">CRM Dashboard</h1>

<div class="card-container">

    <div class="card">
        <h2>{{ total_leads }}</h2>
        <p>Total Leads</p>
    </div>

    <div class="card">
        <h2>{{ total_contacts }}</h2>
        <p>Total Contacts</p>
    </div>

    <div class="card">
        <h2>{{ total_deals }}</h2>
        <p>Total Deals</p>
    </div>

</div>

{% endblock %}
