{% extends "base.html" %}

{% block title %}
{% if object %}
Edit Interaction
{% else %}
Add Interaction
{% endif %}
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">

                {% if object %}
                    Edit Interaction
                {% else %}
                    Log New Interaction
                {% endif %}

            </h4>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'interaction_list' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
