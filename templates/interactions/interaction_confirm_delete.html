{% extends "base.html" %}

{% block title %}Delete Interaction{% endblock %}


{% block content %}

<div class="container-fluid mt-4">


    <div class="crm-card p-4 text-center">


        <div class="mb-4">

            <i class="bi bi-exclamation-triangle-fill text-danger"
               style="font-size:50px;">
            </i>

        </div>



        <h3 class="text-white mb-3">
            Delete Interaction
        </h3>



        <p class="text-muted">

            Are you sure you want to delete this interaction?

        </p>



        <div class="delete-box mb-4">

            <strong class="text-white">
                {{ object }}
            </strong>

        </div>




        <form method="post">

            {% csrf_token %}


            <button type="submit"
                    class="btn btn-danger px-4">

                <i class="bi bi-trash me-1"></i>
                Yes, Delete

            </button>



            <a href="{% url 'interaction_list' %}"
               class="btn btn-outline-light ms-2 px-4">

                Cancel

            </a>


        </form>


    </div>


</div>


{% endblock %}
