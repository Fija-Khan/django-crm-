{% extends "base.html" %}

{% block title %}
My Profile
{% endblock %}

{% block content %}

<div class="container py-4">

    <div class="profile-card crm-card">

        <h3 class="crm-title mb-4">
            <i class="bi bi-person-circle me-2"></i>
            My Profile
        </h3>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="text-center mb-4">

                {% if user.profile_pic %}
                    <img src="{{ user.profile_pic.url }}" class="profile-img">
                {% else %}
                    <img src="https://via.placeholder.com/120" class="profile-img">
                {% endif %}

            </div>

            <div class="mb-3">
                <label class="crm-label">Username</label>
                <input
                    type="text"
                    name="username"
                    value="{{ user.username }}"
                    class="form-control crm-input">
            </div>

            <div class="mb-3">
                <label class="crm-label">Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    class="form-control crm-input">
            </div>

            <div class="mb-3">
                <label class="crm-label">Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ user.phone }}"
                    class="form-control crm-input">
            </div>

            <div class="mb-4">
                <label class="crm-label">Profile Picture</label>
                <input
                    type="file"
                    name="profile_pic"
                    class="form-control crm-input">
            </div>

            <button
                type="submit"
                class="crm-btn-primary w-100">

                <i class="bi bi-check-circle me-2"></i>

                Update Profile

            </button>

        </form>

    </div>

</div>

{% endblock %}
