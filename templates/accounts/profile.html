{% extends "base.html" %}

{% block title %}
My Profile
{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-xl-7 col-lg-8 col-md-10">

            <div class="crm-card profile-card">

                <!-- Header -->

                <div class="profile-header">

                    <h3 class="crm-title">
                        <i class="bi bi-person-circle me-2"></i>
                        My Profile
                    </h3>

                    <p class="profile-subtitle">
                        Update your personal information and profile picture.
                    </p>

                </div>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- Profile Image -->

                    <div class="profile-image-wrapper">

                        {% if user.profile_pic %}
                        <img src="{{ user.profile_pic.url }}" alt="Profile Image" class="profile-img">
                        {% else %}
                        <img src="https://via.placeholder.com/150" alt="Profile Image" class="profile-img">
                        {% endif %}

                    </div>

                    <div class="row">

                        <!-- Username -->

                        <div class="col-md-6 mb-4">

                            <label class="crm-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                value="{{ user.username }}"
                                class="form-control crm-input"
                                placeholder="Enter username">

                        </div>

                        <!-- Email -->

                        <div class="col-md-6 mb-4">

                            <label class="crm-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                value="{{ user.email }}"
                                class="form-control crm-input"
                                placeholder="Enter email">

                        </div>

                        <!-- Phone -->

                        <div class="col-md-6 mb-4">

                            <label class="crm-label">
                                Phone Number
                            </label>

                            <input
                                type="text"
                                name="phone"
                                value="{{ user.phone }}"
                                class="form-control crm-input"
                                placeholder="Enter phone number">

                        </div>

                        <!-- Profile Picture -->

                        <div class="col-md-6 mb-4">

                            <label class="crm-label">
                                Upload Profile Picture
                            </label>

                            <input
                                type="file"
                                name="profile_pic"
                                class="form-control crm-input">

                        </div>

                    </div>

                    <div class="text-end">

                        <button type="submit" class="crm-btn-primary">

                            <i class="bi bi-check-circle me-2"></i>

                            Save Changes

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
